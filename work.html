    <script>
        // Update current time
        function updateTime() {
            const timeElement = document.getElementById("time");
            const now = new Date();
            const options = { timeZone: 'Europe/Helsinki', hour12: false };
            timeElement.innerHTML = now.toLocaleTimeString('fi-FI', options);
        }

        // Toggle between light and dark theme
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle("dark-theme");
            const themeButton = document.getElementById("theme-toggle");

            // Change button text based on the theme
            if (body.classList.contains("dark-theme")) {
                themeButton.innerHTML = "🌞";
            } else {
                themeButton.innerHTML = "🌙";
            }
        }

        // Initialize time and theme
        setInterval(updateTime, 1000);
        updateTime();  // Initial call to show the time immediately

        document.querySelectorAll('.skill-box').forEach((box, index) => {
            box.style.animationDelay = `${index * 0.2}s`; // Staggered delay: 0.2s per box
        });
    </script>
